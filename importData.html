    document.getElementById('startBtn').addEventListener('click', async () => {
      document.getElementById('startBtn').disabled = true;
      log("Starting upload...");
      try {
        const itemsSet = new Set();
        const peopleSet = new Set();

        // 1. ACCOUNTS
        log("\\n>> Uploading Accounts");
        const accLines = rawAccounts.split('\\n').map(l=>l.trim()).filter(Boolean);
        for (let line of accLines) {
           let parts = line.split('\\t');
           if(parts.length < 3) parts = line.split(/\\s{2,}/); // fallback if spaces
           let name = parts[0]||''; let opening = parts[1]||'0'; let type = parts[2]||'';
           await addDoc(collection(db, "users", UID, "accounts"), {
             name: name.trim(),
             openingBalance: Number(opening),
             currentBalance: Number(opening),
             type: type.trim()
           });
           log(" Added Account: " + name);
        }

        // 2. CATEGORIES
        log("\\n>> Uploading Categories");
        const catLines = rawCategories.split('\\n').map(l=>l.trim()).filter(Boolean);
        for (let line of catLines) {
           let parts = line.split('\\t');
           if(parts.length < 2) parts = line.split(/\\s{2,}/);
           let name = parts[0]||''; let type = parts[1]||'';
           await addDoc(collection(db, "users", UID, "categories"), {
             name: name.trim(), type: type.trim()
           });
           log(" Added Cat: " + name);
        }

        // 3. TEMPLATES
        log("\\n>> Uploading Templates");
        const tplLines = rawTemplates.split('\\n').map(l=>l.trim()).filter(Boolean);
        for (let line of tplLines) {
           let parts = line.split('\\t');
           if(parts.length < 5) parts = line.split(/\\s{2,}/);
           let type=parts[0]||''; let name=parts[1]||''; let acc=parts[2]||''; let cat=parts[3]||''; let item=parts[4]||''; let amt=parts[5]||'0'; let toFrom=parts[6]||'';
           await addDoc(collection(db, "users", UID, "templates"), {
             type: type.trim(), name: name.trim(), account: acc.trim(),
             category: cat.trim(), item: item.trim(), amount: Number(amt)||0, tofrom: toFrom.trim()
           });
           log(" Added Template: " + name);
        }

        // 4. TRANSACTIONS
        log("\\n>> Uploading Transactions & Gathering Items/People");
        const txnLines = rawTransactionsStr.split('\\n').map(l=>l.trim()).filter(Boolean);
        let batchNo = 1;
        for (let line of txnLines) {
           let parts = line.split('\\t');
           if(parts.length < 5) parts = line.split(/\\s{2,}/);
           let dateStr=parts[0]||''; let account=parts[1]||''; let category=parts[2]||''; let item=parts[3]||''; let amount=parts[4]||'0'; let toFrom=parts[5]||'';
           
           item = typeof item === 'string' ? item.trim() : '';
           toFrom = typeof toFrom === 'string' ? toFrom.trim() : '';
           const catClean = typeof category === 'string' ? category.trim() : '';

           if(item && catClean !== 'TRANSFER') itemsSet.add(item);
           if(toFrom && catClean !== 'TRANSFER') peopleSet.add(toFrom);

           const dparts = dateStr.split('/');
           let jsDate = new Date();
           if(dparts.length === 3) jsDate = new Date(dparts[2], dparts[1]-1, dparts[0], 12, 0, 0);

           await addDoc(collection(db, "users", UID, "transactions"), {
             date: jsDate.toISOString(),
             account: (account||'').trim(),
             category: catClean,
             item: item,
             amount: Number(amount),
             toFrom: toFrom
           });
           if(batchNo++ % 20 === 0) log(" Uploaded " + (batchNo-1) + " transactions...");
        }
        log(" Uploaded total " + txnLines.length + " transactions.");

        // 5. ITEMS
        log("\\n>> Uploading Items extracted from data");
        for (let item of [...itemsSet]) {
            await addDoc(collection(db, "users", UID, "items"), { value: item });
        }
        log(" Added " + itemsSet.size + " unique items.");

        // 6. PEOPLE
        log("\\n>> Uploading People configured");
        for (let person of [...peopleSet]) {
            await addDoc(collection(db, "users", UID, "people"), { value: person });
        }
        log(" Added " + peopleSet.size + " people.");

        // 7. RECALCULATE BALANCES
        log("\\n>> Recalculating Current Balances for All Accounts");
        
        const accsSnap = await getDocs(collection(db, "users", UID, "accounts"));
        const txnsSnap = await getDocs(collection(db, "users", UID, "transactions"));
        
        for (let accDoc of accsSnap.docs) {
           const accData = accDoc.data();
           let sum = accData.openingBalance || 0;
           txnsSnap.docs.forEach(d => {
              if (d.data().account === accData.name) {
                 sum += Number(d.data().amount);
              }
           });
           await updateDoc(doc(db, "users", UID, "accounts", accDoc.id), {
             currentBalance: sum
           });
           log(" Updated " + accData.name + " balance to: " + sum);
        }

        log("\\nSUCCESS! All data imported to Firestore.");
        log("You can safely delete this importData.html file and log in to your dashboard.");
      } catch (err) {
        log("ERROR: " + err.message);
      }
    });
